spring:
  application:
    name: worker

  # ── Virtual Threads (Project Loom) ───────────────────────────────────────────
  # Requires Java 21. The boundedElastic scheduler (used for blocking PDF
  # download and PDFBox extraction) runs on virtual threads instead of platform
  # threads — making those operations cheaper under concurrent load.
  threads:
    virtual:
      enabled: true

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

server:
  port: ${PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  metrics:
    tags:
      # Common tag on every metric — useful for filtering in Grafana when multiple services report to the same Prometheus
      application: worker

# ai-service connection
ai-service:
  url: ${AI_SERVICE_URL:http://localhost:8000}

# Internal API key sent to ai-service via X-Internal-Api-Key header
# Production: replace with mTLS client certificates
internal:
  api-key: ${INTERNAL_API_KEY:change-me-in-prod}

# RabbitMQ consumer tuning
# qos: max messages prefetched from broker (limits concurrent in-flight processing jobs)
# flatmap-concurrency: max simultaneous processing pipelines (should be <= qos)
# Production: tune based on available heap and observed PDF sizes
worker:
  consumer:
    qos: ${WORKER_CONSUMER_QOS:2}
    flatmap-concurrency: ${WORKER_CONSUMER_FLATMAP_CONCURRENCY:2}
