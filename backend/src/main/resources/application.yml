spring:
  application:
    name: backend

  # ── Database ─────────────────────────────────────────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/learning_assistant}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    # Hibernate validates against Liquibase-managed schema; it never auto-creates DDL.
    # Production note: 'validate' is the correct production setting — Liquibase owns schema,
    # Hibernate verifies its JPA mappings match. Use 'none' only if Hibernate validation is noisy.
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        jdbc:
          time_zone: UTC
    open-in-view: false  # Avoid lazy-loading issues; all data access must be in @Transactional

  # ── Database Migrations ───────────────────────────────────────────────────────
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

  # ── Messaging ────────────────────────────────────────────────────────────────
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    # Fail fast if RabbitMQ is unreachable rather than blocking the HTTP request thread.
    # Without this, convertAndSend() blocks indefinitely on a dropped connection,
    # causing upload requests to hang until Railway's load balancer kills them.
    # Production: tune based on observed p99 reconnect latency.
    connection-timeout: 5000

  # ── Cache / Rate Limiting ─────────────────────────────────────────────────────
  # Production: Redis Cluster with TLS; locally Redis runs in Docker
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms

  servlet:
    multipart:
      # 20 MB max file size; enforced at the servlet layer before reaching the controller.
      # GlobalExceptionHandler maps MaxUploadSizeExceededException → 413 Payload Too Large.
      max-file-size: 20MB
      max-request-size: 22MB

  jackson:
    # Serialize Instant/LocalDate as ISO-8601 strings, not epoch timestamps.
    # Frontend expects "2024-01-15T10:00:00Z" not 1705312800000.
    serialization:
      write-dates-as-timestamps: false

# ── Supabase ──────────────────────────────────────────────────────────────────
# Production note: SUPABASE_JWT_SECRET must be at least 256 bits for HS256.
# A zero-trust deployment would use JWKS (RS256) via Supabase's public JWKS URL.
supabase:
  jwt-secret: ${SUPABASE_JWT_SECRET:}
  url: ${SUPABASE_URL:}
  storage-bucket: ${SUPABASE_STORAGE_BUCKET:documents}

# ── CORS ──────────────────────────────────────────────────────────────────────
# Set CORS_ALLOWED_ORIGINS in production to your Railway frontend URL.
# Multiple origins: comma-separated, e.g. "https://app.railway.app,https://www.myapp.com"
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ── Server ────────────────────────────────────────────────────────────────────
server:
  port: ${PORT:8080}
  error:
    # Disable Spring Boot's default /error redirect; all errors go through GlobalExceptionHandler.
    whitelabel:
      enabled: false

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: backend

# ── API Docs ──────────────────────────────────────────────────────────────────
# Production note: set springdoc.swagger-ui.enabled=false and springdoc.api-docs.enabled=false
# in the Railway production environment profile.
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  config: classpath:logback-spring.xml
